name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bats:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # bats-core works on both; macos-latest exercises the BSD tools
        # the project actually targets (sed -i '', stat -f, etc.). ubuntu
        # catches portability regressions early.
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install bats-core
        run: |
          if ! command -v bats >/dev/null 2>&1; then
            git clone --depth=1 https://github.com/bats-core/bats-core.git /tmp/bats-core
            sudo /tmp/bats-core/install.sh /usr/local
          fi
          bats --version

      - name: Run test suite
        run: bats tests/
